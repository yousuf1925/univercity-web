version: "3.8"

services:
  web:
    image: node:18
    container_name: nextjs-jenkins-app
    working_dir: /app

    volumes:
      - .:/app

    env_file:
      - /home/ubuntu/.env   # ✅ external env file

    ports:
      - "3002:3000"   # host:container

    command: sh -c "npm install && npm run build && npx next start -H 0.0.0.0 -p 3000"

    
